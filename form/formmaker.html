<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <div id="editor-screen" class="hidden container mx-auto max-w-4xl p-6">
        <header class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-black text-amber-500 tracking-wider">FORM_MAKER</h1>
                <p class="text-xs text-zinc-500">Databaseless & Serverless Encrypted Generator</p>
            </div>
            <button onclick="publishForm()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold px-6 py-2 rounded-lg transition-all shadow-lg shadow-amber-500/20 cursor-pointer">
                Publish Form
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-zinc-900 border border-zinc-800 p-4 rounded-xl h-fit space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Form Global Settings</label>
                    <input type="text" id="form-title-input" value="Untitled Form" placeholder="Form Title" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm focus:outline-none focus:border-amber-500 mb-2">
                    <input type="text" id="form-bg-input" placeholder="Background Image URL" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm focus:outline-none focus:border-amber-500 mb-2">
                    <input type="url" id="form-webhook-input" placeholder="Webhook URL (Discord, etc.)" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm focus:outline-none focus:border-amber-500 text-amber-400">
                </div>

                <hr class="border-zinc-800">

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Add Form Blocks</label>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="addBlock('text')" class="w-full bg-zinc-950 border border-zinc-800 hover:border-amber-500/50 p-2.5 rounded text-left text-sm flex items-center gap-2 cursor-pointer transition">
                            <span class="text-amber-500">📝</span> Text Input
                        </button>
                        <button onclick="addBlock('password')" class="w-full bg-zinc-950 border border-zinc-800 hover:border-amber-500/50 p-2.5 rounded text-left text-sm flex items-center gap-2 cursor-pointer transition">
                            <span class="text-amber-500">🔒</span> Password Input
                        </button>
                        <button onclick="addBlock('email')" class="w-full bg-zinc-950 border border-zinc-800 hover:border-amber-500/50 p-2.5 rounded text-left text-sm flex items-center gap-2 cursor-pointer transition">
                            <span class="text-amber-500">📧</span> Email Input
                        </button>
                        <button onclick="addBlock('checkbox')" class="w-full bg-zinc-950 border border-zinc-800 hover:border-amber-500/50 p-2.5 rounded text-left text-sm flex items-center gap-2 cursor-pointer transition">
                            <span class="text-amber-500">☑️</span> Checkbox Group
                        </button>
                        <button onclick="addBlock('embed')" class="w-full bg-zinc-950 border border-zinc-800 hover:border-amber-500/50 p-2.5 rounded text-left text-sm flex items-center gap-2 cursor-pointer transition">
                            <span class="text-amber-500">🔗</span> Embed Block (Video/Link/Frame)
                        </button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                    <span class="text-xs font-bold text-zinc-500 uppercase">Live Workspace Layout</span>
                    <div id="blocks-container" class="space-y-4 mt-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="viewer-screen" class="hidden container mx-auto max-w-xl p-6 min-h-screen flex flex-col justify-center">
        <form id="render-form" class="bg-zinc-900/90 backdrop-blur border border-zinc-800 p-8 rounded-2xl shadow-2xl space-y-6">
            <h2 id="view-form-title" class="text-2xl font-bold text-center tracking-tight text-white"></h2>
            
            <div id="view-fields-container" class="space-y-4">
                </div>

            <button type="submit" id="submit-btn" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-black py-3 rounded-xl transition-all cursor-pointer">
                Submit Form
            </button>
        </form>

        <div id="success-box" class="hidden mt-6 bg-zinc-900 border border-zinc-800 p-6 rounded-2xl space-y-4">
            <div class="text-emerald-400 font-bold text-center flex items-center justify-center gap-2">
                <span>✓</span> Submission Sent Successfully!
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Copyable Submission Text Layout:</label>
                <div class="relative">
                    <pre id="output-code-block" class="bg-black p-4 rounded-lg text-xs font-mono overflow-x-auto text-zinc-300 select-all border border-zinc-800"></pre>
                    <button onclick="copyCodeBlock()" class="absolute top-2 right-2 bg-zinc-800 hover:bg-zinc-700 text-white text-[10px] uppercase font-bold px-2 py-1 rounded transition">
                        Copy
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let blocks = [];
        let globalWebhook = "";
        let currentFormTitle = "";
        const ENCRYPTION_KEY = 42;

        window.addEventListener('DOMContentLoaded', () => {
            const formElement = document.getElementById('render-form');
            if (formElement) {
                formElement.addEventListener('submit', handleFormSubmit);
            }

            if (window.location.hash) {
                renderPublishedForm();
            } else {
                document.getElementById('editor-screen').classList.remove('hidden');
                addBlock('text');
            }
        });

        function addBlock(type) {
            const blockId = 'block_' + Date.now() + Math.random().toString(36).substr(2, 4);
            const blockObj = {
                id: blockId,
                type: type,
                label: type.charAt(0).toUpperCase() + type.slice(1),
                meta: type === 'checkbox' ? ['Option 1'] : (type === 'embed' ? 'https://example.com' : '')
            };
            blocks.push(blockObj);
            renderEditorBlocks();
        }

        function removeBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            renderEditorBlocks();
        }

        function updateBlockLabel(id, value) {
            const block = blocks.find(b => b.id === id);
            if (block) block.label = value;
        }

        function updateBlockMeta(id, value) {
            const block = blocks.find(b => b.id === id);
            if (block) block.meta = value;
        }

        function addCheckboxOption(blockId) {
            const block = blocks.find(b => b.id === blockId);
            if (block && Array.isArray(block.meta)) {
                block.meta.push('New Option');
                renderEditorBlocks();
            }
        }

        function updateCheckboxOption(blockId, index, value) {
            const block = blocks.find(b => b.id === blockId);
            if (block && Array.isArray(block.meta)) {
                block.meta[index] = value;
            }
        }

        function renderEditorBlocks() {
            const container = document.getElementById('blocks-container');
            container.innerHTML = '';

            if (blocks.length === 0) {
                container.innerHTML = `<div class="text-zinc-600 text-center py-8 text-sm">Form canvas is empty. Add blocks on the left menu.</div>`;
                return;
            }

            blocks.forEach((block) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-950 border border-zinc-800 p-4 rounded-lg space-y-3 relative group";
                
                let innerActionHtml = '';

                if (block.type === 'checkbox') {
                    innerActionHtml = `<div class="space-y-1.5 mt-2"><label class="text-xs font-bold text-zinc-500 block uppercase">Checkboxes Options</label>`;
                    block.meta.forEach((opt, idx) => {
                        innerActionHtml += `
                            <input type="text" value="${opt}" oninput="updateCheckboxOption('${block.id}', ${idx}, this.value)" class="w-full bg-zinc-900 border border-zinc-800 text-xs rounded p-1.5 focus:outline-none focus:border-amber-500">
                        `;
                    });
                    innerActionHtml += `<button onclick="addCheckboxOption('${block.id}')" class="text-xs text-amber-500 mt-1 hover:underline cursor-pointer">+ Add Sub-Option</button></div>`;
                } else if (block.type === 'embed') {
                    innerActionHtml = `
                        <div class="mt-2">
                            <label class="text-xs font-bold text-zinc-500 block uppercase mb-1">Target Media Link / URL Source</label>
                            <input type="text" value="${block.meta}" oninput="updateBlockMeta('${block.id}', this.value)" placeholder="https://example.com or Video Source" class="w-full bg-zinc-900 border border-zinc-800 text-xs rounded p-1.5 focus:outline-none focus:border-amber-500">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-1">
                            <label class="text-xs font-bold text-amber-500/70 uppercase tracking-tight block mb-1">${block.type} component</label>
                            <input type="text" value="${block.label}" oninput="updateBlockLabel('${block.id}', this.value)" class="bg-transparent text-white font-medium border-b border-transparent hover:border-zinc-700 focus:border-amber-500 focus:outline-none w-full py-0.5">
                        </div>
                        <button onclick="removeBlock('${block.id}')" class="text-zinc-500 hover:text-red-400 text-sm transition-colors cursor-pointer" title="Remove Block">✕</button>
                    </div>
                    ${innerActionHtml}
                `;
                container.appendChild(card);
            });
        }

        function publishForm() {
            const formTitle = document.getElementById('form-title-input').value || 'Untitled Form';
            const bgImage = document.getElementById('form-bg-input').value || '';
            const webhookUrl = document.getElementById('form-webhook-input').value || '';

            const payload = {
                t: formTitle,
                b: bgImage,
                w: webhookUrl,
                f: blocks.map(b => ({ id: b.id, ty: b.type, l: b.label, m: b.meta }))
            };

            try {
                const jsonStr = JSON.stringify(payload);
                const compressedUint8 = pako.deflate(jsonStr);
                
                let encryptedStr = "";
                for (let i = 0; i < compressedUint8.length; i++) {
                    encryptedStr += String.fromCharCode(compressedUint8[i] ^ ENCRYPTION_KEY);
                }
                
                const finalToken = btoa(encryptedStr);
                
                window.location.hash = finalToken;
                navigator.clipboard.writeText(window.location.href);
                renderPublishedForm();
                
            } catch (err) {
                console.error(err);
                alert("Compression framework exception triggered during compilation schema configuration runtime.");
            }
        }

        function renderPublishedForm() {
            try {
                const token = window.location.hash.substring(1);
                if (!token) return;

                const rawEncryptedStr = atob(token);
                const buffer = new Uint8Array(rawEncryptedStr.length);
                for (let i = 0; i < rawEncryptedStr.length; i++) {
                    buffer[i] = rawEncryptedStr.charCodeAt(i) ^ ENCRYPTION_KEY;
                }
                
                const jsonRawData = pako.inflate(buffer, { to: 'string' });
                const payload = JSON.parse(jsonRawData);

                globalWebhook = payload.w;
                currentFormTitle = payload.t;

                const editorScreen = document.getElementById('editor-screen');
                if (editorScreen) editorScreen.remove();
                document.getElementById('viewer-screen').classList.remove('hidden');

                document.title = payload.t;
                document.getElementById('view-form-title').innerText = payload.t;

                if (payload.b) {
                    document.body.style.backgroundImage = `url('${payload.b}')`;
                }

                const viewerContainer = document.getElementById('view-fields-container');
                viewerContainer.innerHTML = '';

                payload.f.forEach(field => {
                    const blockWrapper = document.createElement('div');
                    blockWrapper.className = "space-y-1.5";

                    let fieldHtml = `<label data-label="${field.l}" class="block text-sm font-semibold text-zinc-300 field-label-ref">${field.l}</label>`;

                    if (field.ty === 'text' || field.ty === 'password' || field.ty === 'email') {
                        fieldHtml += `<input type="${field.ty}" name="${field.id}" data-type="input" required class="w-full bg-zinc-950/80 border border-zinc-800 focus:border-amber-500 rounded-lg p-3 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500 text-white">`;
                    } 
                    else if (field.ty === 'checkbox') {
                        fieldHtml += `<div class="space-y-2 pt-1">`;
                        if (Array.isArray(field.m)) {
                            field.m.forEach((option) => {
                                fieldHtml += `
                                    <label class="flex items-center gap-3 text-sm text-zinc-300 font-normal cursor-pointer">
                                        <input type="checkbox" name="${field.id}" value="${option}" data-type="checkbox" class="w-4 h-4 rounded text-amber-500 accent-amber-500 border-zinc-800 bg-zinc-950 focus:ring-0">
                                        <span>${option}</span>
                                    </label>
                                `;
                            });
                        }
                        fieldHtml += `</div>`;
                    } 
                    else if (field.ty === 'embed') {
                        fieldHtml = `
                            <div class="pt-2">
                                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wide mb-1.5">${field.l}</label>
                                <div class="w-full rounded-lg overflow-hidden border border-zinc-800 bg-black aspect-video">
                                    <iframe src="${field.m}" class="w-full h-full border-0" allowfullscreen></iframe>
                                </div>
                            </div>
                        `;
                    }

                    blockWrapper.innerHTML = fieldHtml;
                    viewerContainer.appendChild(blockWrapper);
                });

            } catch (err) {
                console.error(err);
                document.body.innerHTML = `<div class="min-h-screen flex items-center justify-center text-zinc-500 text-sm">Failed to parse form. The URL parameter data is broken or corrupted.</div>`;
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            
            let plainTextOutput = `[${currentFormTitle}]\n`;
            let embedFields = [];

            const wrappers = e.target.querySelectorAll('.space-y-1.5');
            
            wrappers.forEach(wrapper => {
                const labelEl = wrapper.querySelector('.field-label-ref');
                if (!labelEl) return;
                
                const labelName = labelEl.getAttribute('data-label');
                let valueStr = "";

                const textInput = wrapper.querySelector('input[data-type="input"]');
                if (textInput) {
                    valueStr = textInput.value;
                }

                const checkedBoxes = wrapper.querySelectorAll('input[data-type="checkbox"]:checked');
                if (checkedBoxes.length > 0) {
                    valueStr = Array.from(checkedBoxes).map(cb => cb.value).join(', ');
                } else if (wrapper.querySelector('input[data-type="checkbox"]')) {
                    valueStr = "None Selected";
                }

                if (textInput || wrapper.querySelector('input[data-type="checkbox"]')) {
                    plainTextOutput += `${labelName}: ${valueStr}\n`;
                    embedFields.push({
                        name: labelName,
                        value: valueStr || "*(Empty)*",
                        inline: false
                    });
                }
            });

            document.getElementById('output-code-block').innerText = plainTextOutput;
            document.getElementById('success-box').classList.remove('hidden');
            
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerText = "Form Data Submitted";
            document.getElementById('submit-btn').className = "w-full bg-zinc-800 text-zinc-500 font-black py-3 rounded-xl cursor-not-allowed";

            alert("Form processed successfully!");

            if (globalWebhook) {
                const discordPayload = {
                    embeds: [{
                        title: `New Submission: ${currentFormTitle}`,
                        color: 16753920,
                        fields: embedFields,
                        description: `\`\`\`\n${plainTextOutput}\`\`\``,
                        timestamp: new Date().toISOString()
                    }]
                };

                fetch(globalWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(discordPayload)
                })
                .then(() => alert("Webhook dispatched cleanly to Discord!"))
                .catch(err => {
                    console.error('Failed to dispatch API webhook payload:', err);
                    alert("Failed to send to Discord.");
                });
            } else {
                alert("Note: No webhook URL was specified for this form config.");
            }
        }

        function copyCodeBlock() {
            const codeText = document.getElementById('output-code-block').innerText;
            navigator.clipboard.writeText(codeText);
            alert("Submission text copied to clipboard!");
        }
    </script>
</body>
</html>
